<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Concerns Pipeline Dashboard</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --panel-bg: #1e293b;
      --border-color: #334155;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --success-color: #10b981;
      --warning-color: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background-color: var(--panel-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .toggle-container {
      display: flex;
      background: var(--bg-color);
      padding: 0.25rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .toggle-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .toggle-btn.active {
      background-color: var(--accent-color);
      color: var(--text-color);
    }

    .top-right-actions {
      display: flex;
      gap: 1rem;
    }

    .btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .main-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 2rem;
      overflow-y: auto;
      display: none;
    }

    .page.active {
      display: block;
    }

    .sql-builder {
      background: var(--panel-bg);
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
    }

    .sql-builder select {
      background: var(--bg-color);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 0.5rem;
      border-radius: 4px;
      font-weight: bold;
    }

    .card {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .card h2 {
      margin-bottom: 1rem;
      color: var(--text-muted);
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .scroll-container {
      max-height: 380px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.95rem;
    }

    th {
      background-color: var(--bg-color);
      color: var(--text-muted);
      position: sticky;
      top: 0;
    }

    .flyout {
      position: fixed;
      top: 0;
      right: -450px;
      width: 450px;
      height: 100%;
      background: var(--panel-bg);
      border-left: 1px solid var(--border-color);
      box-shadow: -5px 0 25px rgba(0,0,0,0.5);
      transition: right 0.3s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .flyout.open {
      right: 0;
    }

    .flyout-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .flyout-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .flyout-content {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
    }

    .unprocessed-item {
      background: var(--bg-color);
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border: 1px solid var(--border-color);
    }

    .unprocessed-item span {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: block;
      margin-top: 0.5rem;
    }

    .flyout-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border-color);
    }

    .btn-block {
      width: 100%;
      padding: 1rem;
    }

    .dev-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    .dev-panel-stack {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: var(--bg-color);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 1rem;
      border-radius: 6px;
      resize: none;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .meta-input-group {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .meta-input-group input {
      background: var(--bg-color);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 0.6rem;
      border-radius: 6px;
    }

    .output-box, .console-box {
      height: 320px;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      padding: 1rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      overflow-y: auto;
      color: #a3e635;
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .console-box {
      color: #cbd5e1;
      height: 200px;
    }
  </style>
</head>
<body>

  <header>
    <div class="toggle-container">
      <button class="toggle-btn active" onclick="switchPage('home')">Home Explorer</button>
      <button class="toggle-btn" onclick="switchPage('dev')">Dev Sandbox</button>
    </div>

    <div class="top-right-actions" id="home-actions">
      <button class="btn" onclick="openUnprocessedPanel()">Unprocessed Concerns Panel</button>
    </div>
  </header>

  <main class="main-container">

    <div id="home-page" class="page active">
      <div class="sql-builder">
        <span>SELECT</span>
        <select id="sql-select">
          <option value="*">* (All Fields)</option>
          <option value="EntryID, RawConcern, Date, Source">EntryID, RawConcern, Date, Source</option>
          <option value="KeyWord, InsertedDate">KeyWord, InsertedDate</option>
          <option value="DepartmentID, DepartmentName">DepartmentID, DepartmentName</option>
        </select>
        <span>FROM</span>
        <select id="sql-from">
          <option value="RawData">RawData</option>
          <option value="Department">Department</option>
          <option value="KeyWords">KeyWords</option>
          <option value="CategorizedData">CategorizedData</option>
        </select>
        <button class="btn" style="margin-left: auto;" onclick="runPredefinedQuery()">Execute Query</button>
      </div>

      <div class="card">
        <h2 id="table-title">Table Viewer: RawData</h2>
        <div class="scroll-container">
          <table id="main-data-table">
            <thead>
              </thead>
            <tbody>
              </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="dev-page" class="page">
      <div class="dev-grid">
        <div class="dev-panel-stack">
          <div class="card">
            <h2>Manual Concern Ingestion Pipeline</h2>
            <div class="meta-input-group">
              <input type="text" id="dev-source" placeholder="Source (e.g. Manual_Entry)" value="Manual_Entry">
            </div>
            <textarea id="dev-concern-input" placeholder="Paste a raw student concern string here..."></textarea>
            <button class="btn" onclick="submitToPipeline()">Process to Pipeline Engine</button>
          </div>
          
          <div class="card">
            <h2>Runtime Console Log Output</h2>
            <div class="console-box" id="console-output">[SYSTEM]: Sandbox mode active. Bound to local live database channels.</div>
          </div>
        </div>

        <div class="dev-panel-stack">
          <div class="card">
            <h2>Deterministic JSON Object Output (env.AI)</h2>
            <div class="output-box" id="ai-json-output">// Awaiting instruction payload...</div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <div id="flyout-panel" class="flyout">
    <div class="flyout-header">
      <h3>Queue: Unprocessed Concerns</h3>
      <button class="flyout-close" onclick="toggleFlyout(false)">&times;</button>
    </div>
    <div class="flyout-content" id="unprocessed-list">
      </div>
    <div class="flyout-footer">
      <button class="btn btn-block" style="background-color: var(--success-color);" onclick="compileAllQueued()">Compile All Queued Objects</button>
    </div>
  </div>

  <script>
    // Lifecycle setup
    document.addEventListener("DOMContentLoaded", () => {
      runPredefinedQuery();
    });

    function logToConsole(message) {
      const consoleBox = document.getElementById("console-output");
      const timestamp = new Date().toLocaleTimeString();
      consoleBox.innerHTML += `\n[${timestamp}]: ${message}`;
      consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    // Dynamic Database Query Client Core
    async function runPredefinedQuery() {
      const selectVal = document.getElementById("sql-select").value;
      const fromVal = document.getElementById("sql-from").value;
      document.getElementById("table-title").innerText = `Table Viewer: ${fromVal}`;

      try {
        const response = await fetch("/api/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ select: selectVal, from: fromVal })
        });

        if (!response.ok) throw new Error("Database request failed");
        const data = await response.json();
        renderTable(data);
      } catch (err) {
        logToConsole(`Error executing query: ${err.message}`);
      }
    }

    function renderTable(data) {
      const table = document.getElementById("main-data-table");
      const thead = table.querySelector("thead");
      const tbody = table.querySelector("tbody");
      
      thead.innerHTML = "";
      tbody.innerHTML = "";

      if (!data || data.length === 0) {
        tbody.innerHTML = "<tr><td colspan='100%'>No data rows returned from target relation.</td></tr>";
        return;
      }

      // Generate Columns
      const headers = Object.keys(data[0]);
      const trHead = document.createElement("tr");
      headers.forEach(h => {
        const th = document.createElement("th");
        th.innerText = h;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);

      // Generate Data Rows
      data.forEach(row => {
        const trBody = document.createElement("tr");
        headers.forEach(h => {
          const td = document.createElement("td");
          td.innerText = row[h] !== null ? row[h] : "";
          trBody.appendChild(td);
        });
        tbody.appendChild(trBody);
      });
    }

    // Flyout Processing Logic
    async function openUnprocessedPanel() {
      toggleFlyout(true);
      const container = document.getElementById("unprocessed-list");
      container.innerHTML = "Loading live queue data...";

      try {
        const response = await fetch("/api/unprocessed");
        const unprocessed = await response.json();
        
        container.innerHTML = "";
        if(unprocessed.length === 0) {
          container.innerHTML = "<p style='color: var(--text-muted);'>No current unprocessed entries in queue.</p>";
          return;
        }

        unprocessed.forEach(item => {
          const div = document.createElement("div");
          div.className = "unprocessed-item";
          div.innerHTML = `
            <strong>ID: ${item.EntryID}</strong>
            <p style="margin-top: 0.25rem;">${item.RawConcern}</p>
            <span>Received: ${item.Date} | Source: ${item.Source}</span>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        container.innerHTML = "Failed to load live queue information.";
      }
    }

    async function compileAllQueued() {
      logToConsole("Initializing batch compilation engine on remaining unprocessed data rows...");
      try {
        const response = await fetch("/api/compile-all", { method: "POST" });
        const summary = await response.json();
        logToConsole(`Batch analysis run completed! Successfully handled ${summary.processedCount} records.`);
        toggleFlyout(false);
        runPredefinedQuery();
      } catch (err) {
        logToConsole(`Batch error pipeline execution halted: ${err.message}`);
      }
    }

    // Dev View Pipeline Submission Logic
    async function submitToPipeline() {
      const rawConcernText = document.getElementById("dev-concern-input").value;
      const sourceVal = document.getElementById("dev-source").value;

      if (!rawConcernText.trim()) {
        alert("Please specify a raw input value string first.");
        return;
      }

      logToConsole(`Transmitting processing payload to AI Worker Router...`);
      document.getElementById("ai-json-output").innerText = "Invoking deterministic neural parameters (temp: 0)...";

      try {
        const response = await fetch("/api/ai-process", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ rawConcern: rawConcernText, source: sourceVal })
        });

        const pipelineOutput = await response.json();
        document.getElementById("ai-json-output").innerText = JSON.stringify(pipelineOutput, null, 2);
        logToConsole(`Successfully processed entry. Inserted mapping into system architecture tables.`);
      } catch (err) {
        logToConsole(`Worker computation exception encountered: ${err.message}`);
        document.getElementById("ai-json-output").innerText = `An architecture fault has occurred. Check logs.`;
      }
    }

    function switchPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`${pageId}-page`).classList.add('active');
      
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      const flyoutTrigger = document.getElementById('home-actions');
      if(pageId === 'home') {
        flyoutTrigger.style.display = 'block';
      } else {
        flyoutTrigger.style.display = 'none';
        toggleFlyout(false);
      }
    }

    function toggleFlyout(open) {
      const flyout = document.getElementById('flyout-panel');
      if (open) {
        flyout.classList.add('open');
      } else {
        flyout.classList.remove('open');
      }
    }
  </script>
</body>
</html>
